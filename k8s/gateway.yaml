# ─────────────────────────────────────────────────────────────────
# Flask Gateway — Deployment + LoadBalancer Service + Ingress
# ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: task-scheduler
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0   # zero-downtime deploy
      maxSurge:       1
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: your-registry/task-gateway:latest   # replace with your image
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: REDIS_HOST
              value: "redis.task-scheduler.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: GATEWAY_PORT
              value: "5000"
          resources:
            requests:
              memory: "128Mi"
              cpu:    "100m"
            limits:
              memory: "256Mi"
              cpu:    "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds:       5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds:       15

      terminationGracePeriodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: task-scheduler
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port:       80
      targetPort: 5000
  type: LoadBalancer   # Use ClusterIP + Ingress for production
---
# Optional: Ingress for path-based routing (requires nginx ingress controller)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-ingress
  namespace: task-scheduler
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: task-scheduler.example.com   # replace with your domain
      http:
        paths:
          - path:     /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 80
