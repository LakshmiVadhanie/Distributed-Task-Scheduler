syntax = "proto3";

package taskscheduler;

option java_package = "com.taskscheduler.proto";
option java_multiple_files = true;
option java_outer_classname = "TaskSchedulerProto";

// ─────────────────────────────────────────
// SERVICE: Scheduler → Worker  (task dispatch)
// ─────────────────────────────────────────
service WorkerService {
  rpc ExecuteTask(ExecuteTaskRequest) returns (ExecuteTaskResponse);
  rpc GetWorkerStatus(WorkerStatusRequest) returns (WorkerStatusResponse);
}

// ─────────────────────────────────────────
// SERVICE: Worker → Scheduler  (heartbeat / registration)
// ─────────────────────────────────────────
service HeartbeatService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc SendHeartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

// ─────────────────────────────────────────
// Messages – WorkerService
// ─────────────────────────────────────────
message ExecuteTaskRequest {
  string task_id    = 1;
  string task_type  = 2;
  string payload    = 3;
  int32  priority   = 4;
  int64  timeout_ms = 5;
}

message ExecuteTaskResponse {
  string     task_id          = 1;
  TaskStatus status           = 2;
  string     result           = 3;
  string     error_message    = 4;
  int64      execution_time_ms = 5;
}

message WorkerStatusRequest {
  string worker_id = 1;
}

message WorkerStatusResponse {
  string       worker_id    = 1;
  WorkerStatus status       = 2;
  int32        active_tasks = 3;
  int32        capacity     = 4;
  double       cpu_load     = 5;
}

// ─────────────────────────────────────────
// Messages – HeartbeatService
// ─────────────────────────────────────────
message RegisterRequest {
  string worker_id = 1;
  string host      = 2;
  int32  port      = 3;
  int32  capacity  = 4;
}

message RegisterResponse {
  bool   success      = 1;
  string message      = 2;
  string scheduler_id = 3;
}

message HeartbeatRequest {
  string worker_id    = 1;
  int32  active_tasks = 2;
  double cpu_load     = 3;
  double memory_usage = 4;
  int64  timestamp    = 5;
}

message HeartbeatResponse {
  bool acknowledged = 1;
  bool is_leader    = 2;
}

// ─────────────────────────────────────────
// Enums
// ─────────────────────────────────────────
enum TaskStatus {
  PENDING   = 0;
  RUNNING   = 1;
  COMPLETED = 2;
  FAILED    = 3;
  RETRYING  = 4;
}

enum WorkerStatus {
  IDLE       = 0;
  BUSY       = 1;
  OVERLOADED = 2;
  OFFLINE    = 3;
}
